<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="240" viewBox="0 0 960 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AgentILS Logo</title>
  <desc>Logo for AgentILS, inspired by aviation precision, ILS localizer and glide slope guidance.</desc>

  <defs>
    <linearGradient id="gradBlue" x1="26" y1="28" x2="127" y2="129" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7EE7FF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="55" y1="26" x2="134" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C084FC"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="gradMint" x1="31" y1="102" x2="89" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="glow" x1="24" y1="24" x2="136" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0F2FE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- mark -->
  <g transform="translate(36 52)" filter="url(#shadow)">
    <rect x="0" y="0" width="112" height="112" rx="28" fill="#F8FAFC"/>
    <rect x="0.75" y="0.75" width="110.5" height="110.5" rx="27.25" stroke="#E2E8F0" stroke-width="1.5"/>

    <!-- localizer beam -->
    <path d="M24 28L55 59" stroke="url(#gradBlue)" stroke-width="10" stroke-linecap="round"/>
    <path d="M33 109L78 64" stroke="url(#gradMint)" stroke-width="10" stroke-linecap="round"/>

    <!-- glide slope beam -->
    <path d="M75 28L46 57" stroke="url(#gradPurple)" stroke-width="10" stroke-linecap="round"/>
    <path d="M58 74L88 104" stroke="url(#gradBlue)" stroke-width="10" stroke-linecap="round"/>

    <!-- guidance spark / aircraft nose -->
    <path d="M61.5 49.5
             C64.5 55, 70 58.5, 76.5 58.5
             C70 58.5, 64.5 62, 61.5 67.5
             C58.5 62, 53 58.5, 46.5 58.5
             C53 58.5, 58.5 55, 61.5 49.5Z"
          fill="url(#glow)"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(182 73)">
    <text x="0" y="54"
          style="font: 700 56px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #111827;">
      AgentILS
    </text>
    <text x="0" y="100"
          style="font: 500 24px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #475569; letter-spacing: 0.2px;">
      Intelligent Logical System · Aviation-grade Agent Orchestration
    </text>
  </g>
</svg>
