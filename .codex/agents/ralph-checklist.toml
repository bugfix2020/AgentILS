developer_instructions = """# Ralph Standard Checklists

> **DO NOT EDIT generated targets.** Source of truth: `docs/agents/ralph-checklist.md`.
> Generated to `.claude/agents/ralph-checklist.md` by `pnpm run sync:instructions`.

Each role in the Ralph workflow has a **fixed, task-independent** checklist that
the next role must verify. The checklist is the standard вЂ” not what the previous
person wrote in their handoff.

## How to Use

1. When the orchestrator dispatches a subagent, the subagent **reads this file
   first** and locates its role's checklist.
2. The subagent verifies each item against **evidence** (files, commands, diffs),
   not against the predecessor's claims.
3. Results go in the handoff file under `## Pre-flight Check`.
4. If any item fails, the subagent sends work back to the appropriate role.

## Dispatch Protocol

Orchestrator and subagents communicate in three phases:

### Phase 1: Dispatch (ORCHESTRATOR в†’ SUBAGENT)

```
Clearance: <what to do>
Working directory: <run dir>
Restrictions: <read-only? allowed file scope?>
Output: <handoff file path>
```

### Phase 2: Readback (SUBAGENT в†’ ORCHESTRATOR)

After receiving the dispatch, the subagent confirms understanding:

```
Readback confirmed.
Mission: <restated mission>
Restrictions: <restated restrictions>
Output: <restated output>
```

### Phase 3: Completion (SUBAGENT в†’ ORCHESTRATOR)

After finishing, the subagent reports:

```
Status: COMPLETE | BLOCKED
Summary: <what was done>
Evidence: <handoff file path>
Recommendation: <next role or issue description>
```

---

## Product

Product is the first stage вЂ” it has no predecessor to verify. Instead, it
**defines** the standard that all downstream roles verify against.

Product must produce:

- [ ] Story ID and title in `prd.json`
- [ ] Acceptance criteria that are specific and testable
- [ ] Non-goals (what NOT to do)
- [ ] Edge cases
- [ ] Affected files/surfaces listed
- [ ] `requiredStages` set in `prd.json`

---

## Developer вЂ” Receives from Product

Verify the product handoff before writing any code.

### Checklist

- [ ] Story ID and title match `prd.json`
- [ ] Acceptance criteria are specific and testable (not vague like "should work
      well" or "be fast")
- [ ] At least one affected file/surface is listed
- [ ] `requiredStages` are set in `prd.json`
- [ ] Non-goals are defined (what NOT to do)
- [ ] Edge cases are identified
- [ ] No acceptance criterion conflicts with a non-goal

### On Failure

If any item fails, set `stage = "product"` and document which items failed and
why in `handoff/developer.md`.

---

## Tester вЂ” Receives from Developer

Verify the developer's implementation against the standard, not against what the
developer claims they did.

### Checklist

- [ ] Only files listed in developer's "Files Changed" were modified (check
      `git diff --name-only`)
- [ ] Each acceptance criterion has a corresponding code change or test
- [ ] `pnpm --filter <pkg> exec tsc --noEmit` passes (typecheck)
- [ ] `pnpm --filter <pkg> build` passes
- [ ] Changeset exists if a publishable package was affected (check
      `.changeset/config.json` ignore list)
- [ ] No secrets hardcoded (grep source for `API_KEY`, `TOKEN`, `PASSWORD`,
      `SECRET` patterns)
- [ ] Docs updated if behavior changed (README, instructions, preview images)
- [ ] `git diff` matches developer's "Files Changed" list вЂ” no hidden or
      unreported changes

### On Failure

- If implementation is wrong: set `stage = "developer"`, document failures.
- If requirements are wrong: set `stage = "product"`, document the requirement
  issue.

---

## Beta вЂ” Receives from Tester

Simulate a real end user. Verify from the user's perspective, not from the
tester's perspective.

### Checklist

- [ ] Build succeeds from clean state (`pnpm build`)
- [ ] CLI `--help` output matches documentation
- [ ] Changeset accurately describes the change (read `.changeset/*.md`)
- [ ] README description matches actual behavior
- [ ] Preview images (GIF/PNG) match actual output or regeneration is noted
- [ ] New features are discoverable from user perspective
- [ ] Error messages are clear and actionable
- [ ] Ralph run history files complete (`prd.json`, `progress.txt`, all handoffs
      for completed stages)

### On Failure

- If usability bug: set `stage = "developer"`, document what a user would
  experience.
- If fundamental issue: set `stage = "product"`, document the problem.

---

## Ops вЂ” Receives from Developer (or Tester)

Verify CI/CD and release configuration.

### Checklist

- [ ] Changeset bump level matches actual change scope (patch/minor/major)
- [ ] Workflow triggers cover changed file paths
- [ ] GoReleaser config includes new binaries if applicable
- [ ] No hardcoded versions that should be dynamic

### On Failure

Set `stage = "developer"` or `stage = "product"` depending on the issue.

---

## Contributor вЂ” Receives from Tester (or Ops)

Verify documentation from a new-developer perspective.

### Checklist

- [ ] README reflects actual CLI commands and options
- [ ] Affected package CHANGELOG/changeset matches actual changes
- [ ] Instructions reference correct file paths
- [ ] No stale references to removed features
- [ ] New packages appear in relevant package lists
- [ ] Preview images match current behavior

### On Failure

Set `stage = "developer"` if docs need fixing, or `stage = "product"` if the
issue is in requirements."""
