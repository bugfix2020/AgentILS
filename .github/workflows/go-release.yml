name: Go Release

on:
    push:
        tags:
            - '@agent-ils/logger@*'

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version: '1.22'

            - name: Derive version
              id: version
              shell: bash
              run: |
                  tag="${GITHUB_REF_NAME}"
                  version="${tag#@agent-ils/logger@}"
                  if [[ "$version" == "$tag" || ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                    echo "Invalid @agent-ils/logger tag: $tag" >&2
                    exit 1
                  fi
                  {
                    echo "tag=$tag"
                    echo "version=$version"
                  } >> "$GITHUB_OUTPUT"

            - name: Build binaries
              shell: bash
              working-directory: packages/logger-collector
              env:
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  set -euo pipefail
                  rm -rf dist
                  mkdir -p dist

                  build() {
                    local goos="$1"
                    local goarch="$2"
                    local out="$3"
                    GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
                      go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "dist/${out}" .
                  }

                  build darwin arm64 agent-ils-logger-darwin-arm64
                  build darwin amd64 agent-ils-logger-darwin-amd64
                  build linux amd64 agent-ils-logger-linux-amd64
                  build windows amd64 agent-ils-logger-windows-amd64.exe

                  (cd dist && shasum -a 256 agent-ils-logger-* > checksums.txt)

            - name: Publish GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.version.outputs.tag }}
                  VERSION: ${{ steps.version.outputs.version }}
              shell: bash
              run: |
                  gh release create "$TAG" \
                    --title "@agent-ils/logger ${VERSION}" \
                    --notes "Native collector binaries for @agent-ils/logger ${VERSION}." \
                    --target "$GITHUB_SHA" \
                    packages/logger-collector/dist/agent-ils-logger-darwin-arm64 \
                    packages/logger-collector/dist/agent-ils-logger-darwin-amd64 \
                    packages/logger-collector/dist/agent-ils-logger-linux-amd64 \
                    packages/logger-collector/dist/agent-ils-logger-windows-amd64.exe \
                    packages/logger-collector/dist/checksums.txt
