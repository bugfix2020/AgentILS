name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Required for npm Trusted Publisher (OIDC). The release job exchanges
  # this token with npm to publish without a long-lived NPM_TOKEN.
  id-token: write

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'bugfix2020/AgentILS'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          # always-auth + registry-url ensures npm/pnpm publish uses
          # the registry that issues OIDC trusted-publisher tokens.

      # npm >= 11.5.1 is required for OIDC trusted publisher support.
      # Node 22 LTS ships with an older npm; upgrade explicitly.
      - name: Upgrade npm for OIDC publish
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # On main: if .changeset/*.md exist → open/update "Version Packages" PR.
          # When that PR is merged (no remaining .changeset/*.md, version bumps land) → publish.
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: this repo uses npm Trusted Publisher (OIDC).
          # Each package (@agent-ils/mcp / cli / quality-gate / logger)
          # must register this repo + release.yml as a trusted publisher
          # at https://www.npmjs.com/package/<name>/access (Trusted Publisher).
          NPM_CONFIG_PROVENANCE: "true"

