name: Release

on:
    push:
        branches: [main]

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    pull-requests: write
    # Required for npm Trusted Publisher (OIDC). The release job exchanges
    # this token with npm to publish without a long-lived NPM_TOKEN.
    id-token: write

jobs:
    release:
        name: Version PR or publish
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: github.repository == 'bugfix2020/AgentILS'
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  # Node 24 ships with npm >= 11.5 out of the box, which is the
                  # minimum for npm Trusted Publisher (OIDC). Avoids `npm install -g
                  # npm@latest`, which on Node 22 crashes with MODULE_NOT_FOUND
                  # 'promise-retry' (npm 11.5 bundled-deps resolver bug under
                  # /opt/hostedtoolcache/node/22.x/...). The CI workflow keeps
                  # Node 22 LTS for build/typecheck — only release uses Node 24.
                  node-version: 24
                  cache: pnpm
                  registry-url: https://registry.npmjs.org
                  # always-auth + registry-url ensures npm/pnpm publish uses
                  # the registry that issues OIDC trusted-publisher tokens.

            - name: Show npm version
              run: npm --version

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

            - name: Create Release Pull Request or publish
              id: changesets
              uses: changesets/action@v1
              with:
                  # On main: if .changeset/*.md exist → open/update "Version Packages" PR.
                  # When that PR is merged (no remaining .changeset/*.md, version bumps land) → publish.
                  version: pnpm changeset version
                  publish: pnpm changeset publish
                  commit: 'chore(release): version packages'
                  title: 'chore(release): version packages'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # No NPM_TOKEN: this repo uses npm Trusted Publisher (OIDC).
                  # New packages must be published manually first (npm publish from local),
                  # then configure Trusted Publisher on the npm package settings page:
                  # https://www.npmjs.com/package/<name>/access
                  NPM_CONFIG_PROVENANCE: 'true'

            - name: Derive logger collector release
              id: logger-collector-release
              if: steps.changesets.outputs.published == 'true'
              shell: bash
              env:
                  PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
              run: |
                  version="$(node <<'NODE'
                  const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]')
                  const logger = packages.find((pkg) => pkg.name === '@agent-ils/logger')
                  process.stdout.write(logger?.version ?? '')
                  NODE
                  )"

                  if [ -z "$version" ]; then
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  echo "enabled=true" >> "$GITHUB_OUTPUT"
                  echo "version=$version" >> "$GITHUB_OUTPUT"
                  echo "tag=@agent-ils/logger@$version" >> "$GITHUB_OUTPUT"

            - name: Setup Go for logger collector
              if: steps.logger-collector-release.outputs.enabled == 'true'
              uses: actions/setup-go@v6
              with:
                  go-version: '1.22'

            - name: Build logger collector binaries
              if: steps.logger-collector-release.outputs.enabled == 'true'
              shell: bash
              working-directory: packages/logger-collector
              env:
                  VERSION: ${{ steps.logger-collector-release.outputs.version }}
              run: |
                  set -euo pipefail
                  rm -rf dist
                  mkdir -p dist

                  build() {
                    local goos="$1"
                    local goarch="$2"
                    local out="$3"
                    GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
                      go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "dist/${out}" .
                  }

                  build darwin arm64 agent-ils-logger-darwin-arm64
                  build darwin amd64 agent-ils-logger-darwin-amd64
                  build linux amd64 agent-ils-logger-linux-amd64
                  build windows amd64 agent-ils-logger-windows-amd64.exe

                  (cd dist && shasum -a 256 agent-ils-logger-* > checksums.txt)

            - name: Upload logger collector release assets
              if: steps.logger-collector-release.outputs.enabled == 'true'
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.logger-collector-release.outputs.tag }}
              run: |
                  set -euo pipefail
                  for attempt in 1 2 3 4 5 6; do
                    if gh release view "$TAG" >/dev/null 2>&1; then
                      break
                    fi
                    if [ "$attempt" = "6" ]; then
                      echo "GitHub release $TAG was not created by changesets publish" >&2
                      exit 1
                    fi
                    sleep 5
                  done

                  gh release upload "$TAG" \
                    packages/logger-collector/dist/agent-ils-logger-darwin-arm64 \
                    packages/logger-collector/dist/agent-ils-logger-darwin-amd64 \
                    packages/logger-collector/dist/agent-ils-logger-linux-amd64 \
                    packages/logger-collector/dist/agent-ils-logger-windows-amd64.exe \
                    packages/logger-collector/dist/checksums.txt \
                    --clobber
