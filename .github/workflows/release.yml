name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'bugfix2020/AgentILS'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Required so changesets/action can push the Version Packages PR.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # On main: if .changeset/*.md exist → open/update "Version Packages" PR.
          # When that PR is merged (no remaining .changeset/*.md, version bumps land) → publish.
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
